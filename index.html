<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chorale</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%237C9070'/><path d='M14 8v11a4.5 4.5 0 1 1-2-3.74V10h6V8h-4z' fill='white'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7c9070;
    --sage-light: #A8BDA0;
    --sage-lighter: #D4E0D0;
    --sage-lightest: #EEF2EC;
    --sage-dark: #5A6B52;
    --text: #2C2C2C;
    --text-light: #6B6B6B;
    --text-lighter: #9A9A9A;
    --bg: #FAFBF9;
    --white: #FFFFFF;
    --divider: #D4E0D0;
    --disabled: #C8C8C8;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Cormorant Garamond', Georgia, serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ===== FULL HEADER (scrolls away) ===== */
  .header {
    text-align: center;
    padding: 48px 24px 32px;
    background: var(--white);
    border-bottom: 1px solid var(--divider);
  }

  @media (min-width: 768px) {
    .header {
      padding: 20px 24px 16px;
    }
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: 3rem;
    font-weight: 700;
    color: var(--sage);
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }

  @media (min-width: 768px) {
    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 4px;
    }
  }

  .header .subtitle {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-style: italic;
    color: var(--text-light);
    margin-bottom: 24px;
  }

  @media (min-width: 768px) {
    .header .subtitle {
      margin-bottom: 12px;
    }
  }

  .header-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 24px;
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s;
    border: 1.5px solid var(--sage-light);
    color: var(--sage-dark);
    background: var(--white);
  }

  .header-btn:hover {
    background: var(--sage-lightest);
    border-color: var(--sage);
  }

  /* ===== COMPACT HEADER (slides in when scrolled) ===== */
  .header-compact {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: var(--white);
    border-bottom: 1px solid var(--divider);
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transform: translateY(-100%);
    transition: transform 0.3s ease;
  }

  .header-compact.visible {
    transform: translateY(0);
  }

  .header-compact h2 {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--sage);
    white-space: nowrap;
  }

  .compact-actions {
    display: flex;
    gap: 8px;
  }

  .compact-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--sage-light);
    background: var(--white);
    color: var(--sage-dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: background 0.25s, border-color 0.25s;
  }

  .compact-btn:hover {
    background: var(--sage-lightest);
    border-color: var(--sage);
  }

  .compact-btn svg {
    width: 16px;
    height: 16px;
  }

  .header-btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* ===== VOICE SELECTOR ===== */
  .voice-selector {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 24px 0;
  }

  .voice-selector > label {
    display: block;
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    text-align: center;
    letter-spacing: 0.01em;
  }

  .voice-options {
    display: flex;
    gap: 10px;
    justify-content: center;
    background: none;
  }

  .voice-options input[type="radio"] {
    display: none;
  }

  .voice-options .voice-opt {
    flex: 0 1 auto;
    min-width: 90px;
    text-align: center;
    padding: 10px 24px;
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    color: var(--sage);
    cursor: pointer;
    transition: background 0.25s, color 0.25s, border-color 0.25s, box-shadow 0.25s;
    border: 1.5px solid var(--sage-light);
    border-radius: 24px;
    user-select: none;
    background: var(--white);
  }

  .voice-options .voice-opt:hover {
    background: var(--sage-lightest);
    border-color: var(--sage);
  }

  .voice-options input[type="radio"]:checked + .voice-opt {
    background: var(--sage);
    color: var(--white);
    border-color: var(--sage);
    box-shadow: 0 2px 8px rgba(124, 144, 112, 0.3);
  }

  /* ===== SONG LIST ===== */
  .song-list {
    max-width: 640px;
    margin: 28px auto 0;
    padding: 0 24px;
  }

  .song-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--divider);
    background: var(--white);
    transition: background 0.2s;
  }

  .song-item:first-child {
    border-radius: 16px 16px 0 0;
  }

  .song-item:last-child {
    border-bottom: none;
    border-radius: 0 0 16px 16px;
  }

  .song-item:only-child {
    border-radius: 16px;
  }

  .song-info {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .song-number {
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--sage-light);
    min-width: 20px;
  }

  .song-text {
    flex: 1;
    min-width: 0;
  }

  .song-title {
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .song-subtitle {
    font-family: var(--font-body);
    font-size: 0.78rem;
    color: var(--text-light);
    margin-top: 2px;
    font-style: italic;
  }

  .song-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    margin-left: 16px;
  }

  .action-btn {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    border: 1.5px solid var(--sage-light);
    background: var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
    color: var(--sage);
    position: relative;
  }

  .action-btn:hover:not(.disabled) {
    background: var(--sage-lightest);
    border-color: var(--sage);
  }

  .action-btn.disabled {
    border-color: var(--divider);
    color: var(--disabled);
    cursor: default;
    pointer-events: none;
    background: var(--bg);
  }

  .action-btn svg {
    width: 18px;
    height: 18px;
  }

  .action-btn.playing {
    background: var(--sage);
    border-color: var(--sage);
    color: var(--white);
    box-shadow: 0 2px 8px rgba(124, 144, 112, 0.3);
  }

  /* Tooltip */
  .action-btn[data-tooltip]:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 0.72rem;
    padding: 5px 10px;
    border-radius: 8px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }

  /* ===== AUDIO PLAYER ===== */
  .audio-player {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--white);
    border-top: 1.5px solid var(--divider);
    padding: 14px 24px;
    display: none;
    align-items: center;
    gap: 14px;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.06);
  }

  .audio-player.visible {
    display: flex;
  }

  .player-info {
    flex: 1;
    min-width: 0;
  }

  .player-title {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-voice {
    font-size: 0.75rem;
    color: var(--text-light);
  }

  .player-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .player-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .player-btn.play-pause {
    background: var(--sage);
    color: var(--white);
  }

  .player-btn.play-pause:hover {
    background: var(--sage-dark);
  }

  .player-btn.close {
    background: transparent;
    color: var(--text-light);
    border-radius: 50%;
  }

  .player-btn.close:hover {
    background: var(--sage-lightest);
    color: var(--text);
  }

  .player-btn svg {
    width: 18px;
    height: 18px;
  }

  .player-progress-wrap {
    flex: 2;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .player-time {
    font-size: 0.72rem;
    color: var(--text-light);
    min-width: 36px;
    text-align: center;
  }

  .player-progress {
    flex: 1;
    height: 4px;
    background: var(--sage-lighter);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
  }

  .player-progress-bar {
    height: 100%;
    background: var(--sage);
    border-radius: 4px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ===== TWO-COLUMN LAYOUT (desktop only) ===== */
  .main-layout {
    display: block;
  }

  .main-left {
    /* default: full width, single column */
  }

  .sheet-panel {
    display: none;
  }

  @media (min-width: 901px) {
    body {
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding-bottom: 0;
    }

    .header-compact {
      display: none !important;
    }

    .main-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .main-left {
      flex: 0 0 50%;
      max-width: 50%;
      overflow-y: auto;
      padding-bottom: 80px;
    }

    .voice-selector {
      max-width: none;
    }

    .song-list {
      max-width: none;
    }

    .sheet-panel {
      display: flex;
      flex-direction: column;
      flex: 0 0 50%;
      max-width: 50%;
      min-height: 0;
      border-left: 1px solid var(--divider);
      background: var(--white);
    }

    .sheet-panel-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }

    .sheet-panel-header.visible {
      display: flex;
    }

    .sheet-panel-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 12px;
    }

    .sheet-panel-actions {
      display: none;
      gap: 8px;
      flex-shrink: 0;
    }

    .sheet-panel-actions.visible {
      display: flex;
    }

    .sheet-panel-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--sage-light);
      background: var(--white);
      color: var(--sage-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .sheet-panel-btn:hover {
      background: var(--sage-lightest);
      border-color: var(--sage);
    }

    .sheet-panel-btn svg {
      width: 16px;
      height: 16px;
    }

    .sheet-panel-body {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .sheet-panel-body iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .sheet-panel-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-lighter);
      gap: 12px;
    }

    .sheet-panel-empty svg {
      width: 48px;
      height: 48px;
      color: var(--sage-lighter);
    }

    .sheet-panel-empty span {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-style: italic;
    }

    /* Audio player spans full width on desktop */
    .audio-player {
      left: 0;
      right: 0;
      z-index: 100;
    }
  }

  /* ===== ICON LEGEND (mobile only) ===== */
  .icon-legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 14px 16px 0;
    max-width: 640px;
    margin: 0 auto;
  }

  .icon-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-display);
    font-size: 0.82rem;
    color: var(--text-light);
  }

  .icon-legend-item svg {
    width: 16px;
    height: 16px;
    color: var(--sage);
    flex-shrink: 0;
  }

  @media (min-width: 901px) {
    .icon-legend { display: none; }
  }

  /* Mobile adjustments */
  @media (max-width: 600px) {
    .header { padding: 36px 20px 24px; }
    .header h1 { font-size: 2.2rem; }
    .header-actions { flex-direction: column; align-items: center; }
    .header-compact { padding: 8px 16px; }
    .header-compact h2 { font-size: 1.1rem; }
    .voice-selector { padding: 24px 16px 0; }
    .voice-options { gap: 8px; flex-wrap: wrap; }
    .voice-options .voice-opt { font-size: 0.9rem; padding: 9px 18px; min-width: 80px; }
    .song-list { padding: 0 16px; }
    .song-item { padding: 14px 16px; }
    .song-title { font-size: 1.05rem; }
    .song-actions { gap: 5px; margin-left: 10px; }
    .action-btn { width: 36px; height: 36px; }
    .action-btn svg { width: 16px; height: 16px; }
    .player-progress-wrap { display: none; }
    .audio-player { padding: 12px 16px; }
  }
</style>
</head>

<!-- ===== FEATURE SPEC START: Voice Part Browser ===== -->

<div class="main-layout">
  <div class="main-left">
    <section class="voice-selector">
      <label for="voice">Sélectionnez votre voix</label>
      <div class="voice-options">
        <input type="radio" name="voice" id="voice-soprano" value="soprano">
        <label class="voice-opt" for="voice-soprano">Soprane</label>
        <input type="radio" name="voice" id="voice-alto" value="alto">
        <label class="voice-opt" for="voice-alto">Alto</label>
        <input type="radio" name="voice" id="voice-tenor" value="tenor">
        <label class="voice-opt" for="voice-tenor">Ténor</label>

    <div class="icon-legend">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

<!-- Sticky audio player -->
<div class="audio-player" id="audioPlayer">

      <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>

</div>

<audio id="audioEl" preload="none"></audio>

<script>
// ===== SONG DATA =====
const songs = [

  {

  },

  },
  {

    audio: { soprano: "audio/08-laudate-dominum-soprano.mp3", alto: "audio/08-laudate-dominum-alto.mp3", tenor: "audio/08-laudate-dominum-tenor.mp3", basse: "audio/08-laudate-dominum-basse.mp3", tous: "audio/08-laudate-dominum-tous.mp3" }
  },

  },
  {
    id: 95,

  {

    audio: { soprano: "audio/10-hymne-cherubins-soprano.mp3", alto: "audio/10-hymne-cherubins-alto.mp3", tenor: "", basse: "", tous: "audio/10-hymne-cherubins-tous.mp3" }
  },
  {
    id: 11,

    subtitle: "",
    sheetMusic: "partitions/11-sanctus-saint-francois-xavier.pdf",

  },
  {
    id: 12,
    title: "Agnus, Saint Claude la Colombière",
    subtitle: "",
    sheetMusic: "partitions/12-agnus-saint-claude.pdf",
    audio: { soprano: "audio/12-agnus-soprano.mp3", alto: "audio/12-agnus-alto.mp3", tenor: "audio/12-agnus-tenor.mp3", basse: "audio/12-agnus-basse.mp3", tous: "audio/12-agnus-tous.mp3" }
  },
  {
    id: 13,
    title: "À l'Agneau de Dieu",
    subtitle: "Communion",
    sheetMusic: "partitions/13-a-l-agneau-de-dieu.pdf",
    audio: { soprano: "", alto: "", tenor: "", basse: "", tous: "audio/13-a-l-agneau-de-dieu-tous.mp3" }
  },
  {
    id: 14,
    title: "Anima Christi",
    subtitle: "Action de Grâce",
    sheetMusic: "partitions/14-anima-christi.pdf",
    audio: { soprano: "audio/14-anima-christi-soprano.mp3", alto: "audio/14-anima-christi-alto.mp3", tenor: "audio/14-anima-christi-tenor.mp3", basse: "audio/14-anima-christi-basse.mp3", tous: "audio/14-anima-christi-tous.mp3" }
  },
  {
    id: 15,
    title: "O Clemens Maria",
    subtitle: "Chant à la Vierge",
    sheetMusic: "partitions/15-o-clemens-maria.pdf",
    audio: { soprano: "audio/15-o-clemens-maria-soprano.mp3", alto: "audio/15-o-clemens-maria-alto.mp3", tenor: "audio/15-o-clemens-maria-tenor.mp3", basse: "audio/15-o-clemens-maria-basse.mp3", tous: "audio/15-o-clemens-maria-tous.mp3" }
  },
  {
    id: 16,
    title: "Vivre comme le Christ",
    subtitle: "Chant de Sortie",
    sheetMusic: "partitions/16-vivre-comme-le-christ.pdf",
    audio: { soprano: "audio/16-vivre-comme-le-christ-soprano.mp3", alto: "audio/16-vivre-comme-le-christ-alto.mp3", tenor: "audio/16-vivre-comme-le-christ-tenor.mp3", basse: "audio/16-vivre-comme-le-christ-basse.mp3", tous: "audio/16-vivre-comme-le-christ-tous.mp3" }
  }
];

// ===== SVG ICONS =====
const icons = {
  eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
  noteSolo: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>',
  noteMulti: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
};

// ===== STATE =====
let selectedVoice = null;
let currentSongId = null;
let currentType = null; // 'solo' or 'tous'

const audioEl = document.getElementById('audioEl');
const playerEl = document.getElementById('audioPlayer');
const playerTitle = document.getElementById('playerTitle');
const playerVoice = document.getElementById('playerVoice');
const playerPlayPause = document.getElementById('playerPlayPause');
const iconPlay = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');
const playerProgress = document.getElementById('playerProgress');
const playerProgressBar = document.getElementById('playerProgressBar');
const playerTimeCurrent = document.getElementById('playerTimeCurrent');
const playerTimeTotal = document.getElementById('playerTimeTotal');
const playerClose = document.getElementById('playerClose');

// ===== RENDER SONG LIST =====
function renderSongs() {
  const list = document.getElementById('songList');
  list.innerHTML = songs.map((song, idx) => {
    const hasSheet = !!song.sheetMusic;
    const hasSolo = selectedVoice && !!song.audio[selectedVoice];
    const hasTous = !!song.audio.tous;
    const soloDisabled = !selectedVoice || !hasSolo;
    const tousDisabled = !hasTous;

    const soloTooltip = !selectedVoice
      ? 'Selectionnez une voix'
      : (!hasSolo ? 'Pas d\'enregistrement disponible' : 'Ecouter ma voix');
    const tousTooltip = !hasTous ? 'Pas d\'enregistrement disponible' : 'Ecouter l\'ensemble';

    const isSoloPlaying = currentSongId === song.id && currentType === 'solo';
    const isTousPlaying = currentSongId === song.id && currentType === 'tous';

    return `<div class="song-item">
      <div class="song-info">
        <span class="song-number">${idx + 1}.</span>
        <div class="song-text">
          <div class="song-title">${song.title}</div>
          ${song.subtitle ? `<div class="song-subtitle">${song.subtitle}</div>` : ''}
        </div>
      </div>
      <div class="song-actions">
        <button class="action-btn${hasSheet ? '' : ' disabled'}" data-tooltip="Partition" ${hasSheet ? `onclick="openSheet(${song.id})"` : ''}>
          ${icons.eye}
        </button>
        <button class="action-btn${soloDisabled ? ' disabled' : ''}${isSoloPlaying ? ' playing' : ''}" data-tooltip="${soloTooltip}" ${soloDisabled ? '' : `onclick="playSolo(${song.id})"`}>
          ${icons.noteSolo}
        </button>
        <button class="action-btn${tousDisabled ? ' disabled' : ''}${isTousPlaying ? ' playing' : ''}" data-tooltip="${tousTooltip}" ${tousDisabled ? '' : `onclick="playTous(${song.id})"`}>
          ${icons.noteMulti}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ===== VOICE SELECTION =====
document.querySelectorAll('input[name="voice"]').forEach(radio => {
  radio.addEventListener('change', e => {
    selectedVoice = e.target.value;
    renderSongs();
  });
});

// ===== PLAYBACK =====
function playSolo(songId) {
  const song = songs.find(s => s.id === songId);
  if (!song || !selectedVoice || !song.audio[selectedVoice]) return;
  startPlayback(song, selectedVoice, 'solo');
}

function playTous(songId) {
  const song = songs.find(s => s.id === songId);
  if (!song || !song.audio.tous) return;
  startPlayback(song, 'tous', 'tous');
}

function startPlayback(song, voiceKey, type) {
  currentSongId = song.id;
  currentType = type;
  audioEl.src = song.audio[voiceKey];
  audioEl.play();
  playerTitle.textContent = song.title;
  const voiceLabels = { soprano: 'Soprane', alto: 'Alto', tenor: 'Tenor', basse: 'Basse', tous: 'Toutes les voix' };
  playerVoice.textContent = voiceLabels[voiceKey] || '';
  playerEl.classList.add('visible');
  updatePlayPauseIcon(true);
  renderSongs();
  // On desktop, also show the sheet music
  if (isDesktopLayout() && song.sheetMusic) {
    openSheet(song.id);
  }
}

// ===== SHEET MUSIC PANEL (desktop) =====
const sheetPanel = document.getElementById('sheetPanel');
const sheetTitle = document.getElementById('sheetTitle');
const sheetBody = document.getElementById('sheetBody');
const sheetEmpty = document.getElementById('sheetEmpty');
const sheetCloseBtn = document.getElementById('sheetClose');
const sheetNewTabBtn = document.getElementById('sheetNewTab');
const sheetActions = document.querySelector('.sheet-panel-actions');
const sheetHeader = document.querySelector('.sheet-panel-header');
let currentSheetUrl = null;

function isDesktopLayout() {
  return window.matchMedia('(min-width: 901px)').matches;
}

function openSheet(songId) {
  const song = songs.find(s => s.id === songId);
  if (!song || !song.sheetMusic) return;

  if (!isDesktopLayout()) {
    window.open(song.sheetMusic, '_blank');
    return;
  }

  currentSheetUrl = song.sheetMusic;
  sheetTitle.textContent = song.title;
  sheetEmpty.style.display = 'none';
  sheetHeader.classList.add('visible');
  sheetActions.classList.add('visible');
  // Remove old iframe if any, then add new one
  const oldIframe = sheetBody.querySelector('iframe');
  if (oldIframe) oldIframe.remove();
  const iframe = document.createElement('iframe');
  iframe.src = song.sheetMusic;
  sheetBody.appendChild(iframe);
}

sheetCloseBtn.addEventListener('click', () => {
  const iframe = sheetBody.querySelector('iframe');
  if (iframe) iframe.remove();
  sheetEmpty.style.display = '';
  sheetTitle.textContent = 'Partition';
  sheetHeader.classList.remove('visible');
  sheetActions.classList.remove('visible');
  currentSheetUrl = null;
});

sheetNewTabBtn.addEventListener('click', () => {
  if (currentSheetUrl) window.open(currentSheetUrl, '_blank');
});

// ===== PLAYER CONTROLS =====
playerPlayPause.addEventListener('click', () => {
  if (audioEl.paused) {
    audioEl.play();
    updatePlayPauseIcon(true);
  } else {
    audioEl.pause();
    updatePlayPauseIcon(false);
  }
});

playerClose.addEventListener('click', () => {
  audioEl.pause();
  audioEl.src = '';
  playerEl.classList.remove('visible');
  currentSongId = null;
  currentType = null;
  renderSongs();
});

function updatePlayPauseIcon(playing) {
  iconPlay.style.display = playing ? 'none' : 'block';
  iconPause.style.display = playing ? 'block' : 'none';
}

// Progress
audioEl.addEventListener('timeupdate', () => {
  if (audioEl.duration) {
    const pct = (audioEl.currentTime / audioEl.duration) * 100;
    playerProgressBar.style.width = pct + '%';
    playerTimeCurrent.textContent = formatTime(audioEl.currentTime);
    playerTimeTotal.textContent = formatTime(audioEl.duration);
  }
});

audioEl.addEventListener('ended', () => {
  updatePlayPauseIcon(false);
  currentSongId = null;
  currentType = null;
  renderSongs();
});

audioEl.addEventListener('pause', () => updatePlayPauseIcon(false));
audioEl.addEventListener('play', () => updatePlayPauseIcon(true));

// Seek
playerProgress.addEventListener('click', e => {
  if (!audioEl.duration) return;
  const rect = playerProgress.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = pct * audioEl.duration;
});

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// ===== COMPACT HEADER (mobile only — hidden on desktop) =====
const headerEl = document.querySelector('.header');
const compactEl = document.getElementById('headerCompact');
window.addEventListener('scroll', () => {
  const show = window.scrollY > headerEl.offsetHeight - 60;
  compactEl.classList.toggle('visible', show);
}, { passive: true });

// ===== INIT =====
renderSongs();
</script>

<!-- ===== FEATURE SPEC END ===== -->
